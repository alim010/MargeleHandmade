<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produse - Mărgele Handmade</title>

<style>

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family: "Segoe UI", sans-serif;
background: linear-gradient(135deg,#0b7a75,#1e90ff);
color:white;
}

/* NAVBAR PREMIUM */

nav{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
padding:18px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

nav a{
color:white;
text-decoration:none;
margin:22px;
font-weight:600;
font-size:18px;
transition:0.3s;
}

nav a:hover{
color:#00ffd5;
letter-spacing:1px;
}

/* CONTAINER */

.container{
padding:110px 20px;
text-align:center;
animation:fadeUp 1s ease forwards;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* BUTTON PREMIUM */

button{
padding:14px 35px;
border:none;
border-radius:40px;
background: linear-gradient(135deg,#00c896,#008cba);
color:white;
font-size:17px;
cursor:pointer;
transition:0.4s;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(0,255,200,0.5);
}

/* CARDURI PRODUSE */

.cards{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:35px;
margin-top:60px;
}

.card{
width:260px;
background: rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border-radius:25px;
overflow:hidden;
transition:0.4s;
box-shadow:0 0 20px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-18px) scale(1.03);
box-shadow:0 0 35px rgba(0,255,220,0.3);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:22px;
}

/* FOOTER */

footer{
background:rgba(0,0,0,0.25);
padding:25px;
text-align:center;
margin-top:90px;
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Acasă</a>
    <a href="produse.html">Produse</a>
    <a href="despre.html">Despre</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h1>Produsele Noastre</h1>

    <div class="cards">
        <div class="card">
            <h3>Brățară Verde</h3>
            <p>Lucrată manual, elegantă și rezistentă.</p>
        </div>

        <div class="card">
            <h3>Colier Albastru</h3>
            <p>Design modern, perfect pentru cadou.</p>
        </div>

        <div class="card">
            <h3>Cercei Handmade</h3>
            <p>Ușori și unici.</p>
        </div>
    </div>
</div>

<footer>
© 2026 Mărgele Handmade
</footer>

</body>

</html>
